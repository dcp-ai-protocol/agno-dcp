# Ruff configuration for agno-dcp.
target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit
    "A",   # flake8-builtins
    "RUF", # ruff-specific
]
ignore = [
    "E501",   # line too long (formatter handles this)
    "S101",   # use of assert (allowed in tests)
    "S603",   # subprocess without shell=True is fine
    "B008",   # function call in default argument (acceptable for FastAPI/Pydantic patterns)
]

[lint.per-file-ignores]
"tests/*" = ["S", "N", "B"]
"agno_dcp/audit/verifier.py" = ["T201"]  # CLI may print

[lint.isort]
known-first-party = ["agno_dcp"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
